services:
  kanboard:
    image: kanboard/kanboard:latest
    container_name: kanboard
    ports:
      - "8080:80"
    volumes:
      - ./data/kanboard/data:/var/www/app/data
      - ./data/kanboard/plugins:/var/www/app/plugins
      - ./data/kanboard/ssl:/etc/nginx/ssl
    restart: unless-stopped
    environment:
      - TZ=Europe/Warsaw
